<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter Dashboard - Online Voting System</title>
    <meta name="description" content="Voter dashboard to cast votes and view results">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">E-Vote Dashboard</div>
        <div class="nav-links">
            <span id="user-greeting">Hello, Voter</span>
            <button class="btn btn-secondary" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- Biometric Overlay -->
    <div id="biometric-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; display:flex; justify-content:center; align-items:center; opacity: 1;">
        <div class="glass-panel" style="width: 400px; text-align:center;">
            <h3 class="text-primary mb-2">Biometric Verification</h3>
            <p class="text-muted mb-4" style="font-size:0.875rem;">Scan your identity to securely cast your vote.</p>
            <input type="text" id="verify-voter-id" class="form-control mb-4" placeholder="Enter Voter ID" required>
            <div style="width:100%; height:250px; background:#111; position:relative; overflow:hidden; border-radius: 8px;">
                <video id="verify-webcam" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
                <canvas id="verify-canvas" class="hidden" width="300" height="250"></canvas>
            </div>
            <button id="btn-verify-vote" class="btn mt-4">Scan Face & Check Identity</button>
            <button id="btn-cancel-vote" class="btn mt-2" style="background:transparent; border: 1px solid #4b5563; color: #9ca3af;">Cancel</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <div id="alert-box" class="alert hidden"></div>

        <div id="elections-view">
            <h2>Active Elections</h2>
            <div id="elections-grid" class="dashboard-grid">
                <!-- Elections injected here -->
            </div>
        </div>

        <div id="election-detail-view" class="hidden">
            <button onclick="showElections()" class="btn btn-secondary mb-4">&larr; Back to Elections</button>
            <div class="glass-panel">
                <h2 id="detail-title">Election Title</h2>
                <p id="detail-desc" class="text-muted mb-4"></p>
                <div id="detail-status" class="mb-4"></div>
                
                <div id="candidates-container">
                    <h3>Candidates</h3>
                    <div id="candidates-grid" class="candidate-grid">
                        <!-- Candidates injected here -->
                    </div>
                </div>

                <div id="results-container" class="hidden mt-4">
                    <h3>Live Results</h3>
                    <div class="chart-container">
                        <canvas id="resultsChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Candidate Template Modal / Confirm logic in JS -->
    
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
