<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter Dashboard - Online Voting System</title>
    <meta name="description" content="Voter dashboard to cast votes and view results">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">E-Vote Dashboard</div>
        <div class="nav-links">
            <span id="user-greeting">Hello, Voter</span>
            <button class="btn btn-secondary" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- Biometric Overlay -->
    <div id="biometric-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:flex; justify-content:center; align-items:center; backdrop-filter: blur(8px);">
        <div class="glass-panel" style="width: 420px; text-align:center; box-shadow: 0 0 50px rgba(99,102,241,0.3); border: 1px solid rgba(255,255,255,0.1);">
            <div style="margin-bottom: 20px;">
                <div style="display:inline-block; padding: 10px; background: rgba(99,102,241,0.1); border-radius: 50%; margin-bottom: 10px;">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                </div>
                <h3 class="text-primary" style="margin:0; font-size: 1.5rem;">Secure Verification</h3>
                <p class="text-muted" style="font-size:0.85rem; margin-top:5px;">Capture identity to authorize your ballot</p>
            </div>
            
            <div class="form-group text-left" style="margin-bottom: 20px;">
                <label style="font-size: 0.75rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 1px;">Voter Serial ID</label>
                <input type="text" id="verify-voter-id" class="form-control" placeholder="Enter Registration ID" style="background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1);" required>
            </div>

            <div style="width:100%; height:280px; background:#000; position:relative; overflow:hidden; border-radius: 12px; border: 1px solid rgba(99,102,241,0.3);">
                <video id="verify-webcam" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
                <canvas id="verify-canvas" class="hidden" width="400" height="300"></canvas>
                
                <!-- Scanning Animation Layer -->
                <div id="scanner-line" style="position:absolute; top:0; left:0; width:100%; height:2px; background: linear-gradient(to right, transparent, #6366f1, transparent); box-shadow: 0 0 15px #6366f1; animation: scan 3s linear infinite; z-index: 10;"></div>
                <div style="position:absolute; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.4) 100%); pointer-events:none;"></div>
            </div>

            <style>
                @keyframes scan {
                    0% { top: 0%; }
                    50% { top: 100%; }
                    100% { top: 0%; }
                }
            </style>

            <button id="btn-verify-vote" class="btn mt-4" style="width:100%; height: 50px; font-weight: 700;">Initiate Identity Capture</button>
            <button id="btn-cancel-vote" class="btn mt-3" style="width:100%; background:transparent; border: 1px solid rgba(255,255,255,0.1); color: #9ca3af; font-size: 0.9rem;">Cancel Voting Process</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <div id="alert-box" class="alert hidden"></div>

        <div id="elections-view">
            <h2>Active Elections</h2>
            <div id="elections-grid" class="dashboard-grid">
                <!-- Elections injected here -->
            </div>
        </div>

        <div id="election-detail-view" class="hidden">
            <button onclick="showElections()" class="btn btn-secondary mb-4">&larr; Back to Elections</button>
            <div class="glass-panel">
                <h2 id="detail-title">Election Title</h2>
                <p id="detail-desc" class="text-muted mb-4"></p>
                <div id="detail-status" class="mb-4"></div>
                
                <div id="candidates-container">
                    <h3>Candidates</h3>
                    <div id="candidates-grid" class="candidate-grid">
                        <!-- Candidates injected here -->
                    </div>
                </div>

                <div id="results-container" class="hidden mt-4">
                    <h3>Live Results</h3>
                    <div class="chart-container">
                        <canvas id="resultsChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Candidate Template Modal / Confirm logic in JS -->
    
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
