<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Online Voting System</title>
    <meta name="description" content="Register an account for the online voting system">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="auth-container">
        <div class="glass-panel text-center">
            <h1 class="navbar-brand mb-4">E-Vote</h1>
            <h2>Create Account</h2>
            <p class="text-muted mb-4">Join our democratic platform</p>

            <div id="alert-box" class="alert hidden"></div>

            <form id="register-form" onsubmit="handleRegister(event)">
                <div class="form-group text-left">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" required placeholder="John Doe">
                </div>
                <div class="form-group text-left">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="you@example.com">
                </div>
                <div class="form-group text-left">
                    <label for="password">Password</label>
                    <input type="password" id="password" minlength="6" class="form-control" required
                        placeholder="••••••••">
                </div>
                <div class="form-group text-left">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" minlength="6" class="form-control" required
                        placeholder="••••••••">
                </div>
                <div class="form-group text-left">
                    <label for="role">Select Role</label>
                    <select id="role" class="form-control" required onchange="toggleRoleFields()">
                        <option value="voter">Voter</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <div id="voter-fields">
                    <div class="form-group text-left">
                        <label for="voter-id">Voter ID (Serial #)</label>
                        <input type="text" id="voter-id" class="form-control" placeholder="VOTER-XXXX">
                    </div>
                </div>

                <!-- Admin Specific Fields -->
                <div id="admin-fields" style="display:none;">
                    <div class="form-group text-left">
                        <label for="admin-photo">Staff Photo URL (Optional)</label>
                        <input type="url" id="admin-photo" class="form-control" placeholder="https://...">
                    </div>
                </div>
                <button type="submit" id="btn-reg" class="btn mt-2">Sign Up</button>
            </form>

            <p class="mt-4 text-muted">Already have an account? <a href="index.html">Sign in</a></p>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        function toggleRoleFields() {
            const role = document.getElementById('role').value;
            if (role === 'voter') {
                document.getElementById('voter-fields').style.display = 'block';
                document.getElementById('admin-fields').style.display = 'none';
            } else {
                document.getElementById('voter-fields').style.display = 'none';
                document.getElementById('admin-fields').style.display = 'block';
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            const btn = document.getElementById('btn-reg');
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const role = document.getElementById('role').value;
            const voterId = document.getElementById('voter-id').value;
            const adminPhoto = document.getElementById('admin-photo') ? document.getElementById('admin-photo').value : '';

            if (password !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                // Register without biometric data
                await registerUser(name, email, password, role, voterId, null, adminPhoto);
            } catch (e) {
                showAlert(e.message, 'error');
            }

            btn.disabled = false;
            btn.textContent = 'Sign Up';
        }
    </script>
</body>

</html>
